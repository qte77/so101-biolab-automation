# PrusaSlicer profile: TPU 95A 0.2mm layer height
# For gripper_tips_tpu.stl only
# Minimal settings for printability validation (not production gcode)

[print]
layer_height = 0.2
first_layer_height = 0.2
perimeters = 3
fill_density = 20%
support_material = 0
detect_thin_wall = 1
overhangs = 1

[filament]
filament_type = FLEX
temperature = 230
bed_temperature = 50

[printer]
nozzle_diameter = 0.4
bed_shape = 0x0,220x0,220x220,0x220
