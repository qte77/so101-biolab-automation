# PrusaSlicer production profile: Prusa MK4 — PLA/PLA+ 0.2mm
# Optimized for functional robotics parts (tool cones, mounts, cradles, docks)
# Printer: Original Prusa MK4 (Nextruder, input shaper)
# Network: 192.168.1.86 / prusa-mk4.local
#
# Usage:
#   prusa-slicer --load hardware/slicer/profiles/prusa_mk4_pla_02mm.ini \
#                --export-gcode -o output.gcode input.stl

# Layer
layer_height = 0.2
first_layer_height = 0.2

# Walls — 3 perimeters for functional strength
perimeters = 3
external_perimeters_first = 0
extra_perimeters = 1
thin_walls = 1

# Infill — 25% grid for structural parts
fill_density = 25%
fill_pattern = grid
top_fill_pattern = monotonic
bottom_fill_pattern = monotonic
infill_every_layers = 1
infill_overlap = 25%

# Top/bottom — 5 solid layers for strength + water tightness
top_solid_layers = 5
bottom_solid_layers = 4

# Speed — MK4 input shaper allows higher speeds safely
perimeter_speed = 100
external_perimeter_speed = 60
infill_speed = 150
solid_infill_speed = 100
top_solid_infill_speed = 50
first_layer_speed = 30
travel_speed = 250
travel_speed_z = 12

# Support — off by default (most biolab parts are designed support-free)
support_material = 0
support_material_auto = 0
support_material_threshold = 55

# Brim — 3mm for bed adhesion on functional parts
skirts = 0
brim_width = 3

# Seam — aligned for consistent dimensional accuracy
seam_position = aligned

# Overhangs
overhangs = 1
bridge_speed = 30
bridge_flow_ratio = 0.95

# Elephant foot compensation (0.2mm typical for MK4 textured sheet)
elefant_foot_compensation = 0.2

# Filament
filament_type = PLA
temperature = 215
first_layer_temperature = 220
bed_temperature = 60
first_layer_bed_temperature = 60

# Cooling — PLA needs aggressive cooling
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100
bridge_fan_speed = 100
disable_fan_first_layers = 1
cooling = 1
min_print_speed = 15

# Retraction — Nextruder direct drive
retract_length = 0.4
retract_speed = 35
deretract_speed = 25
retract_lift = 0.2
retract_before_travel = 1
wipe = 1

# Printer
nozzle_diameter = 0.4
bed_shape = 0x0,250x0,250x210,0x210
max_print_height = 220
min_layer_height = 0.07
max_layer_height = 0.32
gcode_flavor = marlin2
