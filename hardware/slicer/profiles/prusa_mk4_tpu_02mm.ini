# PrusaSlicer production profile: Prusa MK4 — TPU 95A 0.2mm
# Optimized for flexible gripper tips (gripper_tips_tpu.stl)
# Printer: Original Prusa MK4 (Nextruder, direct drive — good for flex)
# Network: 192.168.1.86 / prusa-mk4.local
#
# Usage:
#   prusa-slicer --load hardware/slicer/profiles/prusa_mk4_tpu_02mm.ini \
#                --export-gcode -o output.gcode hardware/stl/so101/gripper_tips_tpu.stl

# Layer
layer_height = 0.2
first_layer_height = 0.2

# Walls — 4 perimeters for flexible part durability
perimeters = 4
external_perimeters_first = 0
extra_perimeters = 0
thin_walls = 1

# Infill — 30% gyroid for omnidirectional flex
fill_density = 30%
fill_pattern = gyroid
top_fill_pattern = monotonic
bottom_fill_pattern = monotonic
infill_every_layers = 1
infill_overlap = 30%

# Top/bottom
top_solid_layers = 5
bottom_solid_layers = 4

# Speed — slow for TPU to prevent buckling in Nextruder
perimeter_speed = 30
external_perimeter_speed = 25
infill_speed = 35
solid_infill_speed = 30
top_solid_infill_speed = 25
first_layer_speed = 15
travel_speed = 150
travel_speed_z = 10

# Support
support_material = 0
support_material_auto = 0

# Brim — wider for TPU adhesion
skirts = 0
brim_width = 5

# Seam
seam_position = aligned

# Overhangs
overhangs = 1
bridge_speed = 20
bridge_flow_ratio = 1.0

# Elephant foot
elefant_foot_compensation = 0.1

# Filament
filament_type = FLEX
temperature = 230
first_layer_temperature = 235
bed_temperature = 50
first_layer_bed_temperature = 50

# Cooling — minimal for TPU layer bonding
fan_always_on = 0
min_fan_speed = 30
max_fan_speed = 50
bridge_fan_speed = 80
disable_fan_first_layers = 3
cooling = 1
min_print_speed = 10

# Retraction — minimal for direct-drive TPU (prevents jams)
retract_length = 0.3
retract_speed = 20
deretract_speed = 15
retract_lift = 0.2
retract_before_travel = 2
wipe = 0

# Printer
nozzle_diameter = 0.4
bed_shape = 0x0,250x0,250x210,0x210
max_print_height = 220
min_layer_height = 0.07
max_layer_height = 0.32
gcode_flavor = marlin2
