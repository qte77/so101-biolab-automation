# Dual arm configuration
# Update ports after running: lerobot-find-port

arm_a:
  arm_id: arm_a
  port: /dev/ttyACM1
  role: follower
  cameras:
    wrist:
      type: opencv
      index_or_path: 2
      width: 640
      height: 480
      fps: 30

arm_b:
  arm_id: arm_b
  port: /dev/ttyACM2
  role: follower
  cameras:
    wrist:
      type: opencv
      index_or_path: 4
      width: 640
      height: 480
      fps: 30

leader:
  arm_id: leader
  port: /dev/ttyACM0
  role: leader
  cameras: {}
