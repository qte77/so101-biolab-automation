# PrusaSlicer profile: PLA+ 0.2mm layer height
# Export from PrusaSlicer GUI, then load via: prusa-slicer --load this_file.ini
# Minimal settings for printability validation (not production gcode)

[print]
layer_height = 0.2
first_layer_height = 0.2
perimeters = 2
fill_density = 15%
support_material = 0
detect_thin_wall = 1
overhangs = 1

[filament]
filament_type = PLA
temperature = 210
bed_temperature = 60

[printer]
nozzle_diameter = 0.4
bed_shape = 0x0,220x0,220x220,0x220
