# PrusaSlicer prototype profile: Prusa MK4 — PLA fast fit-check
# Goal: fastest print that still gives usable dimensional accuracy
# Printer: Original Prusa MK4 (Nextruder)

# Layer — 0.3mm for speed, thick enough to be strong
layer_height = 0.3
first_layer_height = 0.3

# Walls — 2 perimeters, enough for fit checking
perimeters = 2
external_perimeters_first = 0
extra_perimeters = 0
thin_walls = 1

# Infill — 15% just for structural integrity
fill_density = 15%
fill_pattern = grid
top_fill_pattern = monotonic
bottom_fill_pattern = monotonic
infill_every_layers = 1
infill_overlap = 25%

# Top/bottom — minimal
top_solid_layers = 3
bottom_solid_layers = 3

# Speed — push MK4 input shaper
perimeter_speed = 150
external_perimeter_speed = 80
infill_speed = 200
solid_infill_speed = 150
top_solid_infill_speed = 60
first_layer_speed = 30
travel_speed = 300
travel_speed_z = 12

# Support
support_material = 0
support_material_auto = 0

# Brim — thin, just enough
skirts = 0
brim_width = 2

# Seam
seam_position = aligned

# Overhangs
overhangs = 1
bridge_speed = 30
bridge_flow_ratio = 0.95

# Elephant foot
elefant_foot_compensation = 0.2

# Filament
filament_type = PLA
temperature = 220
first_layer_temperature = 220
bed_temperature = 60
first_layer_bed_temperature = 60

# Cooling
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100
bridge_fan_speed = 100
disable_fan_first_layers = 1
cooling = 1
min_print_speed = 15

# Retraction
retract_length = 0.4
retract_speed = 35
deretract_speed = 25
retract_lift = 0.2
retract_before_travel = 1
wipe = 1

# Printer
nozzle_diameter = 0.4
bed_shape = 0x0,250x0,250x210,0x210
max_print_height = 220
min_layer_height = 0.07
max_layer_height = 0.32
gcode_flavor = marlin2
