name: Generate SBOM

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Generate SBOM
        uses: qte77/gha-sbom-action@ca8cef2323ca17f985dd478483fcca7aaf45076c # v0.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
