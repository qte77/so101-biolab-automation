name: Generate SBOM

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  SBOM_DIR: docs/SBOM

jobs:
  generate-sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3  # v6.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Create SBOM output directory
        run: mkdir -p "$SBOM_DIR"

      - name: Export GitHub dependency graph SBOM
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: gh api "repos/$REPO/dependency-graph/sbom" --jq '.sbom' > "$SBOM_DIR/github-depgraph.spdx.json"

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0

      - name: Generate Syft SPDX SBOM
        run: syft dir:. -o spdx-json="$SBOM_DIR/syft-scan.spdx.json"

      - name: Create PR if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "$SBOM_DIR/"
          git diff --cached --quiet && echo "No changes" && exit 0
          BRANCH="auto/sbom-update-${{ github.run_number }}"
          git checkout -b "$BRANCH"
          git commit -m "docs: update SBOM"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" --title "docs: update SBOM" --body "Auto-generated by GHA"
