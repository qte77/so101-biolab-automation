[project]
name = "so101-biolab-automation"
version = "0.1.0"
description = "Dual SO-101 robotic arm bio-lab automation: pipetting, tool changing, remote oversight"
readme = "README.md"
license = "Apache-2.0"
# Pin 3.12: build123d → cadquery-ocp → VTK has no cp313 wheels
requires-python = ">=3.12,<3.13"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "websockets>=13.0",
    "opencv-python>=4.10",
    "pyserial>=3.5",
    "pyyaml>=6.0",
    "numpy>=1.26",
]

[dependency-groups]
dev = [
    "ruff>=0.8",
    "pyright>=1.1",
]
test = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
]
# train = [  # ACT policy training — uncomment when GPU available
#     "torch>=2.4",
#     "wandb>=0.18",
# ]
cad = [
    "build123d>=0.10",
]

[tool.hatch.build.targets.wheel]
packages = ["src/biolab", "src/dashboard"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
default-groups = ["dev", "test"]
exclude-newer = "2026-04-09T00:00:00Z"
link-mode = "copy"

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "S", "SIM", "RUF"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]           # assert is how pytest works
"hardware/**" = ["S603"]        # subprocess calls run trusted internal scripts
"tests/test_*" = ["S603"]      # test subprocess calls run project scripts

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "standard"
include = ["src"]
reportMissingImports = "warning"

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "--strict-markers"
asyncio_mode = "auto"
markers = [
    "integration: tests loading real config files",
    "network: tests requiring network access",
    "hardware: tests requiring physical SO-101 arms or cameras",
]
